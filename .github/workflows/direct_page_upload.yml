name: Deploy JBrowse to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true # Fetches the real files

      - name: Check file sizes (Debug)
        run: du -sh docs/ # This will show you exactly how big the docs folder is on the runner

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs' # Uploads your docs folder directly, no Jekyll processing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
