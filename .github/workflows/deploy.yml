name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull LFS files
        run: |
          git lfs install
          git lfs pull
          echo "--- Verifying LFS files are resolved ---"
          file docs/irgsp1/irgsp1_new_renamed.fasta.gz
          head -c 4 docs/irgsp1/irgsp1_new_renamed.fasta.gz | xxd
          echo "--- docs/ size ---"
          du -sh docs/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
